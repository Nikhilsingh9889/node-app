name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main     # Trigger this action on changes to the main branch
    paths:
      - 'server.js'  # You can modify this to other files or directories as needed

jobs:
  deploy:
    runs-on: [self-hosted, dev-runner]   # Specify the self-hosted runner (dev-runner) by name
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # Pulls the latest code from the repository

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2  # Set up Docker Buildx (for multi-platform builds)

    - name: Build Docker image and Deploy using Docker Compose
      run: |
        # Build the Docker image using docker-compose
        docker-compose build
        
        # Bring up the container using docker-compose
        docker-compose up -d

    - name: Run tests (optional)
      run: |
        # Optional: Run any tests here
        echo "Running tests..."

    - name: Clean up Docker containers
      run: |
        # Optional: Tear down the containers after deployment
        docker-compose down
