on:
  push:
    branches:
      - main  # Trigger this action on changes to the main branch
    

jobs:
  deploy:
    runs-on: self-hosted # Ensure your runner matches these labels

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # Pulls the latest code from the repository

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2  # Set up Docker Buildx (for multi-platform builds)

    - name: Build Docker image and Deploy using Docker Compose
      run: |
        echo "Building Docker image..."
        docker-compose build
        echo "Bringing up containers..."
        docker-compose up -d

    - name: Run tests (optional)
      run: |
        echo "Running tests..."
        # Uncomment and add your test script here if needed
        # npm install
        # npm test

    - name: Clean up Docker containers
      run: |
        echo "Cleaning up Docker containers..."
        docker-compose down
